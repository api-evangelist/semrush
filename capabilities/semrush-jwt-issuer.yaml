naftiko: 1.0.0-alpha2
info:
  label: Semrush — JWT Issuer
  description: 'Semrush — JWT Issuer. 1 operations. Lead operation: Semrush Request API access token. Self-contained Naftiko
    capability covering one Semrush business surface.'
  tags:
  - Semrush
  - JWT Issuer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEMRUSH_API_KEY: SEMRUSH_API_KEY
capability:
  consumes:
  - type: http
    namespace: semrush-jwt-issuer
    baseUri: https://api.semrush.com
    description: Semrush — JWT Issuer business capability. Self-contained, no shared references.
    resources:
    - name: app-center-api-v2-jwt-token
      path: /app-center-api/v2/jwt-token/
      operations:
      - name: post
        method: POST
        description: Semrush Request API access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.SEMRUSH_API_KEY}}'
  exposes:
  - type: rest
    namespace: semrush-jwt-issuer-rest
    port: 8080
    description: REST adapter for Semrush — JWT Issuer. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/app-center-api/v2/jwt-token
      name: app-center-api-v2-jwt-token
      description: REST surface for app-center-api-v2-jwt-token.
      operations:
      - method: POST
        name: post
        description: Semrush Request API access token
        call: semrush-jwt-issuer.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: semrush-jwt-issuer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Semrush — JWT Issuer. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: semrush-request-api-access-token
      description: Semrush Request API access token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: semrush-jwt-issuer.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
